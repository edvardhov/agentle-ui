name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 9.15.0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm --filter agentle-ui size

  quality:
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 20
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 9.15.0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @agentle-ui/www build

      - name: Lighthouse CLS budget
        run: npx --yes @lhci/cli@0.14.0 autorun --config=lighthouserc.json

      - name: Serve docs for accessibility scan
        run: pnpm --filter @agentle-ui/www preview:pages &
        shell: bash

      - name: Wait for docs server
        run: npx --yes wait-on@8.0.1 http://127.0.0.1:4173/agentle-ui/example

      - name: Sync Chrome and ChromeDriver
        run: npx --yes browser-driver-manager install chrome

      - name: axe accessibility scan
        run: npx --yes @axe-core/cli@4.12.1 http://127.0.0.1:4173/agentle-ui/example --exit

      - name: Configure GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/www/dist

      - id: deployment
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/deploy-pages@v4
